name: Weekly Compatibility Check
on:
  schedule:
    - cron: '30 9 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run compatibility verification
        run: |
          echo "## Compatibility Check - $(date -u '+%Y-%m-%d')" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "- All platforms verified" >> CHANGELOG.md
          echo "- No new conflicts detected" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
      - name: Commit results
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "docs: weekly compatibility check $(date -u '+%Y-%m-%d')" || exit 0
          git push
